name: PR

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26.x
          cache: true
          cache-dependency-path: go.mod

      - name: Check formatting
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "These files need gofmt:"
            echo "$files"
            exit 1
          fi

      - name: Run staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@v0.7.0
          "$(go env GOPATH)/bin/staticcheck" ./...

      - name: Run tests
        run: go test ./...

  benchmarks:
    name: Benchmark comparison
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout base
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.base.repo.full_name }}
          ref: ${{ github.event.pull_request.base.sha }}
          path: base

      - name: Checkout head
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          path: head

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26.x
          cache: true
          cache-dependency-path: |
            base/go.mod
            head/go.mod

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@v0.0.0-20240108191414-4ad5199aa6b5

      - name: Run base benchmarks
        working-directory: base
        run: go test -bench=. -benchmem -run='^$' -count=5 ./... > ../base.txt

      - name: Run head benchmarks
        working-directory: head
        run: go test -bench=. -benchmem -run='^$' -count=5 ./... > ../head.txt

      - name: Compare benchmarks
        run: |
          {
            echo "## Benchmark comparison"
            echo
            echo "Base: \`${{ github.event.pull_request.base.sha }}\`"
            echo "Head: \`${{ github.event.pull_request.head.sha }}\`"
            echo
            echo '```'
            "$(go env GOPATH)/bin/benchstat" base.txt head.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
